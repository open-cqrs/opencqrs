services:
    event-store:
        image: docker.io/thenativeweb/eventsourcingdb:1.2.0
        user: "root:root"
        volumes:
            - event-data:/events
        command: "run --api-token secret --data-directory /events --http-enabled=true --https-enabled=false --with-ui"
        ports:
            - "3000:3000"

    h2database:
        image: oscarfonts/h2:2.2.224
        ports:
            - "1521:1521"
            - "8081:81"
        environment:
            H2_OPTIONS: "-ifNotExists"


    zipkin:
        image: ghcr.io/openzipkin/zipkin:latest
        container_name: zipkin
        environment:
            - STORAGE_TYPE=mem
        ports:
            - 9411:9411

    otel:
        image: otel/opentelemetry-collector
        volumes:
            - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
        ports:
            - 4318:4318

    application:
        image: "opencqrs/example-application:latest"
        ports:
            - "8080"
        environment:
            ESDB_SERVER_URI: http://event-store:3000
            SPRING_DATASOURCE_URL: jdbc:h2:tcp:h2database:1521/library
            SPRING_DATASOURCE_USERNAME: sa
            SPRING_DATASOURCE_PASSWORD:
            SPRING_SQL_INIT_MODE: always
            SPRING_JPA_HIBERNATE_DDL_AUTO: update
            SERVER_SHUTDOWN: graceful
            JAVA_TOOL_OPTIONS: "-XX:UseSVE=0"
        depends_on:
            - event-store
            - h2database
            - zipkin
            - otel
        deploy:
            replicas: 2

    nginx:
        image: nginx:latest
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - application
        ports:
            - "8080:8080"

volumes:
    event-data: