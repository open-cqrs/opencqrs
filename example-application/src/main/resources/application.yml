spring.application.name: library

esdb:
  server:
    uri: http://localhost:3000
    api-token: secret

opencqrs:
  event-handling:
    standard:
      life-cycle.partitions: 2
    groups:
      logging:
        sequence.resolution: no-sequence
        retry.policy: none
      statistics:
        life-cycle:
          partitions: 1
          controller: application-context
        progress.tracking: in-memory
  metadata:
    propagation:
      keys:
        - "request-uri"
  command-handling:
    cache:
      type: in_memory

management:
  endpoint:
    health:
      show-components: always
      #show-details: always
    beans:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "beans"
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: "http://localhost:4318/v1/traces"
  tracing:
    sampling:
      probability: 1.0 # For Demo purposes: Exports ALL traces and spans to otel collector
  otlp:
    metrics:
      export:
        enabled: false